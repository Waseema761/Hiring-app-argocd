apiVersion: apps/v1
kind: Deployment
metadata:
  name: hiring-app
spec:
  replicas: 4
  selector:
    matchLabels:
      app: hiring-app
  template:
    metadata:
      labels:
        app: hiring-app
    spec:
      containers:
      - name: hiring-app
        image: waseem08/hiring-app:9
        ports:
        - containerPort: 8080
